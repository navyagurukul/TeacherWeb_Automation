name:  Teacher Web Automation CI

on:
  pull_request:
    branches: ["dev"]   # PR → smoke tests
  push:
    branches: ["main","dev"]  # main → regression
  schedule:
    - cron: '0 2 * * *'  # nightly run

jobs:
  # ===================== SMOKE TEST JOB =====================
  smoke-tests:
    name: Smoke Tests
    if: github.event_name == 'pull_request' || github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest

    env:
      TEACHER_WEB: https://teacher.englishgurukul.in/

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
          playwright install || true
      - name: Install Chrome
        uses: browser-actions/setup-chrome@v1

      - name: Run Smoke Tests
        run: |
          pytest -m smoke -n auto --alluredir=allure-results
      - name: Install Allure CLI
        run: |
          npm install -g allure-commandline --save-dev
          allure --version
      - name: Generate Allure Report
        run: |
          allure generate allure-results --clean -o allure-report
      - name: Upload Allure Report
        uses: actions/upload-artifact@v4
        with:
          name: smoke-allure-report
          path: allure-report


  # ===================== REGRESSION TEST JOB =====================
  regression-tests:
    name: Regression Tests
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest

    env:
      TEACHER_WEB: https://teacher.englishgurukul.in/

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
          playwright install || true
      - name: Install Chrome
        uses: browser-actions/setup-chrome@v1

      - name: Run Regression Tests
        run: |
          pytest -m regression -n auto --alluredir=allure-results
      - name: Install Allure CLI
        run: |
          npm install -g allure-commandline --save-dev
          allure --version
      - name: Generate Allure Report
        run: |
          allure generate allure-results --clean -o allure-report
      - name: Upload Allure Report
        uses: actions/upload-artifact@v4
        with:
          name: regression-allure-report
          path: allure-report

      - name: Upload screenshots (on failure)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: regression-screenshots
          path: |
            *.png
            reports/*.png
